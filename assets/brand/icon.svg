<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PolicyStack — policy management">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="ps-doc3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2429"/>
      <stop offset="1" stop-color="#0d1015"/>
    </linearGradient>
    <linearGradient id="ps-doc2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3138"/>
      <stop offset="1" stop-color="#161b20"/>
    </linearGradient>
    <linearGradient id="ps-doc1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f4"/>
      <stop offset="1" stop-color="#d4d4d4"/>
    </linearGradient>
    <radialGradient id="ps-seal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="1" stop-color="#ef4444"/>
    </radialGradient>
    <radialGradient id="ps-badge" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </radialGradient>
    <radialGradient id="ps-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="ps-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#ps-bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#ps-glow)"/>

  <!-- bottom doc (darkest, leftmost) -->
  <g transform="translate(-30 70)">
    <rect x="120" y="120" width="220" height="280" rx="8" fill="url(#ps-doc3)" stroke="#2a3138" stroke-width="1.5"/>
    <!-- fold corner -->
    <polygon points="320,120 340,120 340,140" fill="#0d1015"/>
    <line x1="320" y1="120" x2="340" y2="140" stroke="#3a4148" stroke-width="1.2"/>
    <!-- seal mark -->
    <g transform="translate(230 260)">
      <circle r="32" fill="url(#ps-seal)" opacity="0.7"/>
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="#7f1d1d"/>
    </g>
  </g>

  <!-- middle doc -->
  <g transform="translate(-15 30)">
    <rect x="130" y="130" width="220" height="280" rx="8" fill="url(#ps-doc2)" stroke="#3a4148" stroke-width="1.5"/>
    <polygon points="330,130 350,130 350,150" fill="#161b20"/>
    <line x1="330" y1="130" x2="350" y2="150" stroke="#4a525b" stroke-width="1.2"/>
    <g transform="translate(240 270)">
      <circle r="32" fill="url(#ps-seal)" opacity="0.85"/>
      <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="#991b1b"/>
    </g>
    <!-- text lines -->
    <g fill="#5b6470">
      <rect x="150" y="160" width="120" height="4" rx="1"/>
      <rect x="150" y="172" width="160" height="4" rx="1"/>
      <rect x="150" y="184" width="100" height="4" rx="1"/>
    </g>
  </g>

  <!-- top doc (lightest, foreground) -->
  <g filter="url(#ps-shadow)">
    <rect x="140" y="140" width="220" height="280" rx="8" fill="url(#ps-doc1)" stroke="#a8a29e" stroke-width="1.5"/>
    <!-- fold -->
    <polygon points="340,140 360,140 360,160" fill="#d4d4d4"/>
    <line x1="340" y1="140" x2="360" y2="160" stroke="#78716c" stroke-width="1.2"/>
    <!-- text lines -->
    <g fill="#78716c">
      <rect x="160" y="172" width="120" height="5" rx="1.5"/>
      <rect x="160" y="186" width="170" height="5" rx="1.5"/>
      <rect x="160" y="200" width="100" height="5" rx="1.5"/>
    </g>
    <!-- big seal -->
    <g transform="translate(250 290)">
      <circle r="48" fill="url(#ps-seal)" stroke="#991b1b" stroke-width="3"/>
      <polygon points="0,-22 5,-7 22,0 5,7 0,22 -5,7 -22,0 -5,-7" fill="#7f1d1d"/>
      <circle r="48" fill="none" stroke="#7f1d1d" stroke-width="2" stroke-dasharray="4 4"/>
    </g>
    <!-- authority badge top-right corner -->
    <g transform="translate(340 140)">
      <polygon points="0,0 40,0 40,40 0,40" fill="none"/>
      <circle cx="20" cy="20" r="22" fill="url(#ps-badge)" stroke="#fca5a5" stroke-width="2"/>
      <polygon points="20,8 22,18 32,20 22,22 20,32 18,22 8,20 18,18" fill="#fef2f2"/>
    </g>
  </g>

  <!-- caption strip on top doc -->
  <rect x="160" y="160" width="80" height="6" rx="2" fill="#ef4444"/>
</svg>