<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="PolicyStack">
  <defs>
    <linearGradient id="f-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="f-doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f4"/>
      <stop offset="1" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#f-bg)"/>
  <!-- back doc -->
  <rect x="6" y="9" width="18" height="20" rx="1" fill="#1f2429" stroke="#3a4148" stroke-width="0.5"/>
  <!-- middle doc -->
  <rect x="8" y="7" width="18" height="20" rx="1" fill="#2a3138" stroke="#3a4148" stroke-width="0.5"/>
  <!-- top doc -->
  <rect x="10" y="5" width="18" height="22" rx="1" fill="url(#f-doc)" stroke="#a8a29e" stroke-width="0.5"/>
  <rect x="12" y="8" width="9" height="1" rx="0.3" fill="#78716c"/>
  <rect x="12" y="10" width="13" height="1" rx="0.3" fill="#78716c"/>
  <!-- seal -->
  <circle cx="19" cy="17" r="4" fill="#ef4444" stroke="#7f1d1d" stroke-width="0.4"/>
  <polygon points="19,15 19.5,16.5 21,17 19.5,17.5 19,19 18.5,17.5 17,17 18.5,16.5" fill="#7f1d1d"/>
  <!-- badge corner -->
  <circle cx="26" cy="7" r="2.4" fill="#b91c1c" stroke="#fca5a5" stroke-width="0.4"/>
  <polygon points="26,5.5 26.4,6.5 27.4,6.7 26.6,7.4 26.8,8.4 26,7.9 25.2,8.4 25.4,7.4 24.6,6.7 25.6,6.5" fill="#fef2f2"/>
</svg>