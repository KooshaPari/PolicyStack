version: "3"

vars:
  TASK_TMPDIR: .pytest_cache/task-tmp

  PROJECT_LANG:
    sh: |
      # PolicyStack is Python-first, with package.json used for documentation.
      # Pick the primary implementation language before secondary toolchains.
      if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f requirements.txt ]; then
        printf "python"
      elif [ -f go.mod ]; then
        printf "go"
      elif [ -f Cargo.toml ]; then
        printf "rust"
      elif [ -f package.json ]; then
        printf "node"
      else
        printf "unknown"
      fi

tasks:
  default:
    desc: Show available project tasks
    cmds:
      - task --list-all

  language:
    desc: Print the detected primary project language
    cmds:
      - echo "{{.PROJECT_LANG}}"

  build:
    desc: Build project artifacts for the detected primary language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              mkdir -p "{{.TASK_TMPDIR}}"
              export TMPDIR="$PWD/{{.TASK_TMPDIR}}"
              export PYTHONPYCACHEPREFIX="$PWD/{{.TASK_TMPDIR}}/pycache"
              export PYTHONPATH="$PWD${PYTHONPATH:+:$PYTHONPATH}"
              git ls-files '*.py' | grep -v '^scripts/' | xargs uv run --no-project python -m compileall -q
              ;;
            go)
              go build ./...
              ;;
            rust)
              cargo build --release
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  quality:
    desc: Run build, test, and lint for the detected primary language
    cmds:
      - task: build
      - task: test
      - task: lint

  "docs:build":
    desc: Build the VitePress documentation site
    cmds:
      - npm run docs:build

  test:
    desc: Run tests for the detected primary language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              mkdir -p "{{.TASK_TMPDIR}}"
              export TMPDIR="$PWD/{{.TASK_TMPDIR}}"
              export PYTHONPYCACHEPREFIX="$PWD/{{.TASK_TMPDIR}}/pycache"
              export PYTHONPATH="$PWD${PYTHONPATH:+:$PYTHONPATH}"
              uv run --no-project --with pytest --with pytest-asyncio --with pyyaml --with jsonschema pytest tests/test_smoke.py -q
              ;;
            go)
              go test ./...
              ;;
            rust)
              cargo test
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run lint or validation for the detected primary language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              mkdir -p "{{.TASK_TMPDIR}}"
              export PYTHONPYCACHEPREFIX="$PWD/{{.TASK_TMPDIR}}/pycache"
              export PYTHONPATH="$PWD${PYTHONPATH:+:$PYTHONPATH}"
              uv run --no-project --with ruff ruff check --select E9 --exclude scripts .
              python validate_governance.py
              ;;
            go)
              golangci-lint run
              ;;
            rust)
              cargo clippy --all-targets --all-features -- -D warnings
              cargo fmt --check
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove build and cache artifacts
    cmds:
      - cmd: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          paths = [
              "build",
              "dist",
              "target",
              ".task-tmp",
              "{{.TASK_TMPDIR}}",
              ".pytest_cache",
              ".ruff_cache",
              ".mypy_cache",
              ".ty",
              ".coverage",
              "htmlcov",
              "node_modules",
              "docs/.vitepress/dist",
              "docs/.vitepress/cache",
          ]

          for raw_path in paths:
              path = Path(raw_path)
              if path.is_dir():
                  shutil.rmtree(path)
              elif path.exists():
                  path.unlink()

          for cache_dir in Path(".").rglob("__pycache__"):
              if cache_dir.is_dir():
                  shutil.rmtree(cache_dir)

          for pyc_file in Path(".").rglob("*.pyc"):
              if pyc_file.is_file():
                  pyc_file.unlink()
          PY
