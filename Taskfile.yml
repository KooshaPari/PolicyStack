version: "3"

vars:
  PROJECT_LANG:
    sh: |
      if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f requirements.txt ]; then
        printf "python"
      elif [ -f go.mod ]; then
        printf "go"
      elif [ -f Cargo.toml ]; then
        printf "rust"
      elif [ -f package.json ]; then
        printf "node"
      else
        printf "unknown"
      fi

tasks:
  build:
    desc: Build project artifacts for the detected language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              mkdir -p .pytest_cache/task-tmp
              export TMPDIR="$PWD/.pytest_cache/task-tmp"
              uv run --no-project python -m compileall -q cli contracts extensions policies schemas specs tests tools wrappers policy_lib.py resolve.py validate_governance.py
              ;;
            go)
              go build ./...
              ;;
            rust)
              cargo build --release
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  quality:
    desc: Run build, test, and lint for the detected language
    cmds:
      - task: build
      - task: test
      - task: lint

  "docs:build":
    desc: Build the VitePress documentation site
    cmds:
      - npm run docs:build

  test:
    desc: Run the repo's smoke tests for the detected language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              mkdir -p .pytest_cache/task-tmp
              export TMPDIR="$PWD/.pytest_cache/task-tmp"
              uv run --no-project --with pytest --with pytest-asyncio --with pyyaml --with jsonschema pytest tests/test_smoke.py -q
              ;;
            go)
              go test ./...
              ;;
            rust)
              cargo test
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run repo validation for the detected language
    cmds:
      - cmd: |
          case "{{.PROJECT_LANG}}" in
            python)
              python validate_governance.py
              ;;
            go)
              golangci-lint run
              ;;
            rust)
              cargo clippy --all-targets --all-features -- -D warnings
              cargo fmt --check
              ;;
            node)
              npm run docs:build
              ;;
            *)
              echo "Unable to detect a supported language from repo manifests." >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove build and cache artifacts
    cmds:
      - rm -rf build dist target .task-tmp .pytest_cache .ruff_cache .coverage htmlcov node_modules
      - rm -rf docs/.vitepress/dist docs/.vitepress/cache
      - find . -type d -name __pycache__ -prune -exec rm -rf {} +
      - find . -type f -name '*.pyc' -delete
