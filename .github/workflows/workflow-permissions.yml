name: workflow-permissions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on: [push, pull_request]
permissions:
  contents: read
  pull-requests: write
  statuses: write
  security-events: write

jobs:
  permissions-audit:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow permissions baseline is configured."
