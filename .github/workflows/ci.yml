name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  trace-gate:
    name: FR Coverage Gate
    uses: KooshaPari/phenotype-pm-core/.github/workflows/trace-gate.yml@main
  ci:
    name: PolicyStack CI
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs:build

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python lint + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest pyyaml
          # The `policy_federation` package lives at cli/src/policy_federation.
          # Install it editable so tests can import it; egg-info is generated
          # automatically by pip.
          python -m pip install -e cli

      # Build the Go wrapper from source so the linux-amd64 CI runner has an
      # executable at wrappers/go/policy-wrapper. The committed binary may
      # have been built on a different OS/arch (e.g. macOS arm64) and would
      # raise `OSError: [Errno 8] Exec format error` when the Python tests
      # try to invoke it. Rebuilding from source via Go's cross-compilation
      # is the simplest, most reliable fix.
      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: wrappers/go/go.mod

      - name: Build Go wrapper for the CI runner
        run: |
          set -euo pipefail
          ( cd wrappers/go && go build -o policy-wrapper ./... )
          chmod +x wrappers/go/policy-wrapper
          file wrappers/go/policy-wrapper

      - name: Lint with ruff
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run full test suite
        run: python -m pytest tests/ -q --tb=short

      - name: Validate governance
        run: python validate_governance.py

      - name: Pyright (basic)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyright>=1.1.390"
          python -m pyright --version
          # Restrict pyright to the installable Python package so test
          # files that lack stub declarations don't dominate the report.
          python -m pyright cli/src

