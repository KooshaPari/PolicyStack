name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    # The repository's CodeQL **default setup** is enabled (configured for
    # actions, go, and python). When default setup is enabled, an advanced
    # CodeQL workflow that targets the same language produces a SARIF
    # upload that GitHub cannot process, with this error:
    #
    #   "Code Scanning could not process the submitted SARIF file:
    #    CodeQL analyses from advanced configurations cannot be processed
    #    when the default setup is enabled"
    #
    # To avoid that conflict on push / pull_request / schedule, the analyze
    # job is gated to run only when manually triggered via
    # `workflow_dispatch`. The workflow file is retained so the scan can
    # still be invoked on demand (e.g. when default setup is later disabled
    # or when investigating an outage) without being deleted. The default
    # setup itself continues to perform the scheduled CodeQL analysis.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          category: "/language:python"
