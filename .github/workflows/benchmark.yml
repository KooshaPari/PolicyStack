name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    name: Python Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4- name: Install dependencies
        run: uv sync --dev

      - name: Run benchmarks
        id: benchmark
        run: |
          mkdir -p benchmark-results

          # Check for benchmarks directory
          if [ -d "benchmarks" ]; then
            pytest benchmarks/ --benchmark-json=benchmark-results/bench.json -v || true
          else
            echo "No benchmarks directory found"
          fi

      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4with:
          name: PolicyStack-benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Benchmark results available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

  benchmark-regression:
    name: Compare with Main
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Download current results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4with:
          name: PolicyStack-benchmark-results-${{ github.sha }}
          path: current

      - name: Checkout main
        run: |
          git fetch origin main
          git stash
          git checkout origin/main

      - name: Run main benchmarks
        run: |
          mkdir -p main
          if [ -d "benchmarks" ]; then
            uv sync --dev
            pytest benchmarks/ --benchmark-json=main/bench.json -v || true
          fi

      - name: Compare results
        run: |
          echo "=== Benchmark Comparison ==="
          echo "Main branch results: main/"
          echo "Current branch results: current/"
