name: CodeQL
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2f0f4c8f3d9c8f6b8ed1b1f5f1c4a7a2d0b0d1b7
        with:
          languages: rust

      - name: Autobuild
        uses: github/codeql-action/autobuild@2f0f4c8f3d9c8f6b8ed1b1f5f1c4a7a2d0b0d1b7

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2f0f4c8f3d9c8f6b8ed1b1f5f1c4a7a2d0b0d1b7
        with:
          category: "/language:rust"
