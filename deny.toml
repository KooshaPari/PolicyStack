[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = ["RUSTSEC-2026-0124"]

[licenses]
version = 2
allow = ["Apache-2.0", "MIT", "Unicode-3.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
